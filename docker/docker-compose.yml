services:
  postgres:
    image: postgres:17
    container_name: postgres_db
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres

    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-} -d ${POSTGRES_DB:-}"]
      interval: 5s
      timeout: 2s
      retries: 5
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped


volumes:
  postgres_data: